server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and backend routes to the FastAPI container
    location ~ ^/(api|transactions|admin|health|metrics) {
        proxy_pass http://budget-exporter:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 360s;
    }

    # SPA fallback: all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache Vite-hashed assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
